name: Deploy to NAS_Website Portfolio
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to NAS_Website Portfolio
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.NAS_HOST }}
        username: ${{ secrets.NAS_USERNAME }}
        key: ${{ secrets.NAS_SSH_KEY }}
        timeout: 10m
        debug: true 
        script: |
          cd /volume1/docker/website
          /usr/local/bin/docker compose stop
          /usr/local/bin/docker volume prune -f --all
          git pull origin main
          /usr/local/bin/docker rm -f my_redis my_node_app my_nginx || true
          /usr/local/bin/docker compose build --no-cache
          /usr/local/bin/docker compose up -d --force-recreate
          /usr/local/bin/docker compose ps
          /usr/local/bin/docker compose logs node-app
          echo "Deploy 완료: $(date)"
